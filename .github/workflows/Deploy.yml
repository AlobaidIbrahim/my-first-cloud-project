name: Deploy Apps

on:
  workflow_dispatch:
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/deploy-apps.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy publisher app
        run: |
          gcloud compute scp --recurse apps/Publisher publisher-vm:/tmp/publisher-app \
            --zone=me-central1-a \
            --project=${{ secrets.GCP_PROJECT_ID }}

          gcloud compute ssh publisher-vm \
            --zone=me-central1-a \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --command="sudo rm -rf /opt/publisher-app && sudo cp -r /tmp/publisher-app /opt/publisher-app && cd /opt/publisher-app && sudo python3 -m venv venv && sudo ./venv/bin/pip install -r requirements.txt && sudo systemctl restart publisher-app"

      - name: Deploy receiver app
        run: |
          gcloud compute scp --recurse apps/Subscriber receiver-vm:/tmp/receiver-app \
            --zone=me-central1-a \
            --project=${{ secrets.GCP_PROJECT_ID }}

          gcloud compute ssh receiver-vm \
            --zone=me-central1-a \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --command="sudo rm -rf /opt/receiver-app && sudo cp -r /tmp/receiver-app /opt/receiver-app && cd /opt/receiver-app && sudo python3 -m venv venv && sudo ./venv/bin/pip install -r requirements.txt && sudo systemctl restart receiver-app"