name: Deploy Apps

on:
  workflow_dispatch:
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/Deploy.yml"

env:
  GCP_ZONE: me-central1-a
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo

jobs:
  build:
    name: Build and Push ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - app: publisher
            dir: apps/Publisher
          - app: subscriber
            dir: apps/Subscriber

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:latest \
            ${{ matrix.dir }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:latest

  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - app: publisher
            vm: publisher-vm
          - app: subscriber
            vm: receiver-vm

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pull and restart container
        run: |
          gcloud compute ssh ${{ matrix.vm }} \
            --zone=${{ env.GCP_ZONE }} \
            --project=${{ env.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo gcloud auth configure-docker us-central1-docker.pkg.dev --quiet &&
              sudo docker pull ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.sha }} &&
              sudo docker rm -f ${{ matrix.app }} 2>/dev/null || true &&
              sudo docker run -d \
                --name ${{ matrix.app }} \
                --restart unless-stopped \
                -p 80:80 \
                ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.sha }}
            "

      - name: Verify container
        run: |
          gcloud compute ssh ${{ matrix.vm }} \
            --zone=${{ env.GCP_ZONE }} \
            --project=${{ env.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo docker inspect --format='{{.State.Status}}' ${{ matrix.app }} | grep -q running
            "